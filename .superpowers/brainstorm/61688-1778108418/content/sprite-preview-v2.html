<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sprite Preview</title>
<style>
  body { background: #0d0d1a; color: #eee; font-family: monospace; padding: 24px; margin: 0; }
  h2 { color: #7eb8f7; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .section { margin-bottom: 32px; }
  h3 { color: #7ef7a8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .sprite-row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .sprite-card { background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 12px; text-align: center; }
  canvas { display: block; image-rendering: pixelated; border: 1px solid #2a2a3a; }
  .lbl { font-size: 10px; color: #888; margin-top: 6px; }
  .dir-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .dir-lbl { width: 50px; font-size: 10px; color: #666; text-align: right; flex-shrink: 0; }
  .card-title { font-size: 11px; color: #aaa; margin-bottom: 10px; }
</style>
</head>
<body>
<h2>Sprite Preview — 4× scale</h2>
<p class="subtitle">Placeholder sprites, pixel-perfect at 4×. Swap any PNG file to update the scene.</p>

<div class="section">
  <h3>NPC Characters (48×64px — 3 frames × 4 directions)</h3>
  <div class="sprite-row" id="npc-row"></div>
</div>
<div class="section">
  <h3>Furniture Sprites</h3>
  <div class="sprite-row" id="furn-row"></div>
</div>

<script>

function checkerCtx(canvas) {
  const ctx = canvas.getContext('2d');
  for (let cy = 0; cy < canvas.height; cy += 4) {
    for (let cx = 0; cx < canvas.width; cx += 4) {
      ctx.fillStyle = ((cx/4+cy/4)%2===0) ? '#1a1a2e' : '#222235';
      ctx.fillRect(cx, cy, 4, 4);
    }
  }
  ctx.imageSmoothingEnabled = false;
  return ctx;
}

function showNPC(key, label) {
  const img = new Image();
  img.src = SPRITES[key];
  img.onload = () => {
    const card = document.createElement('div');
    card.className = 'sprite-card';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = label;
    card.appendChild(title);
    ['↓ Down','↑ Up','← Left','→ Right'].forEach((dir, row) => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'dir-row';
      const lbl = document.createElement('div');
      lbl.className = 'dir-lbl';
      lbl.textContent = dir;
      rowDiv.appendChild(lbl);
      for (let frame = 0; frame < 3; frame++) {
        const c = document.createElement('canvas');
        c.width = 16 * SCALE; c.height = 16 * SCALE;
        const ctx = checkerCtx(c);
        ctx.drawImage(img, frame*16, row*16, 16, 16, 0, 0, 16*SCALE, 16*SCALE);
        rowDiv.appendChild(c);
      }
      card.appendChild(rowDiv);
    });
    document.getElementById('npc-row').appendChild(card);
  };
}

function showFurn(key, label, w, h) {
  const img = new Image();
  img.src = SPRITES[key];
  img.onload = () => {
    const card = document.createElement('div');
    card.className = 'sprite-card';
    const c = document.createElement('canvas');
    c.width = w * SCALE; c.height = h * SCALE;
    const ctx = checkerCtx(c);
    ctx.drawImage(img, 0, 0, w*SCALE, h*SCALE);
    card.appendChild(c);
    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    lbl.textContent = label + ' (' + w + '×' + h + ')';
    card.appendChild(lbl);
    document.getElementById('furn-row').appendChild(card);
  };
}

showNPC('npc1', 'npc-1.png — blue shirt');
showNPC('npc2', 'npc-2.png — red hoodie');
showNPC('npc3', 'npc-3.png — teal shirt');

showFurn('bookshelf', 'bookshelf.png', 16, 32);
showFurn('plant',     'plant.png',     16, 24);
showFurn('wall_art',  'wall-art.png',  32, 24);
</script>
</body>
</html>
