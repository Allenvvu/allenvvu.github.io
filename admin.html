<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Office — Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="auth-gate">
    <div id="auth-box">
      <h2>Admin</h2>
      <input type="password" id="auth-password" placeholder="Password" autofocus>
      <button id="auth-enter">Enter</button>
      <p id="auth-error" hidden>Incorrect password</p>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="scene"></canvas>
    <div id="selection-toolbar">
      <button id="rotate-btn-overlay">↻</button>
      <button id="delete-btn-overlay">✕</button>
    </div>
  </div>

  <div id="sidebar">
    <h2>Tiles</h2>
    <button class="tool-btn" data-tool="floor">Floor</button>
    <select id="floor-tile-select">
      <option value="white">White</option>
      <option value="wooden">Wooden</option>
      <option value="gray">Gray</option>
    </select>
    <button class="tool-btn" data-tool="wall">Wall</button>
    <button class="tool-btn" data-tool="void">Void</button>

    <hr class="sep">
    <h2>Furniture</h2>
    <button class="tool-btn active" data-tool="select">Select</button>
    <button class="tool-btn" data-tool="furniture">Furniture</button>

    <div id="variant-section" hidden>
      <select id="furniture-type"></select>
      <button id="variant-btn">DESK_FRONT</button>
    </div>

    <hr class="sep">
    <button class="action-btn" id="save-btn">Save</button>
    <button class="action-btn" id="reset-btn">Reset</button>
    <a id="scene-link" href="index.html">← View Scene</a>
  </div>

  <script type="module" src="js/adminMain.js"></script>
</body>
</html>
